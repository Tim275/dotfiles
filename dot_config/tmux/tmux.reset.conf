# Standard-first: tmux-Defaults gelten (portables Wissen).
# (a) Default-Restores — Tasten die früher überschrieben waren, explizit
#     zurück auf Standard (heilt auch einen laufenden Server beim Reload).
# (b) Additive Extras nur auf Tasten, die im Vanilla-tmux unbelegt sind.

# ── (a) Default-Restores ────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind , command-prompt -I "#W" { rename-window "%%" }
bind . command-prompt -T target { move-window -t "%%" }
bind - delete-buffer
bind = choose-buffer -Z
bind s choose-tree -Zs
bind w choose-tree -Zw
bind '"' split-window
bind % split-window -h
bind l last-window
bind p previous-window
bind : command-prompt

# ── (b) Additive Extras (Vanilla-frei) ──────────────────────────────
bind ^A last-window
bind ^C new-window -c "$HOME"
bind ^D detach
bind ^X lock-server
bind ^L refresh-client
bind ^W list-windows
bind H previous-window
bind L next-window
bind | split-window
bind j select-pane -D
bind k select-pane -U
bind * setw synchronize-panes
bind K send-keys "clear"\; send-keys "Enter"
bind-key -T copy-mode-vi v send-keys -X begin-selection
